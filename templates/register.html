{% extends "base.html" %}
{% block title %}Register — {{ app_name }}{% endblock %}

{% block content %}
<div class="auth-page d-flex align-items-center justify-content-center min-vh-100 py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-10 col-md-7 col-lg-5">
        <div class="auth-card card border-0 shadow-lg">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <span class="brand-icon brand-icon-lg"><i class="bi bi-lightning-charge-fill"></i></span>
              <h2 class="fw-bold mt-3">Create Account</h2>
              <p class="text-muted small">Start your AI-powered fitness journey</p>
            </div>
            <form method="POST" action="{{ url_for('register') }}" novalidate>
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
              <div class="mb-3">
                <label class="form-label fw-medium">Username</label>
                <div class="input-group">
                  <span class="input-group-text border-end-0 bg-transparent"><i class="bi bi-person"></i></span>
                  <input type="text" name="username" class="form-control border-start-0 ps-0"
                         placeholder="your_username" value="{{ username or '' }}" required />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-medium">Email</label>
                <div class="input-group">
                  <span class="input-group-text border-end-0 bg-transparent"><i class="bi bi-envelope"></i></span>
                  <input type="email" name="email" class="form-control border-start-0 ps-0"
                         placeholder="you@example.com" value="{{ email or '' }}" required />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-medium">Password</label>
                <div class="input-group">
                  <span class="input-group-text border-end-0 bg-transparent"><i class="bi bi-lock"></i></span>
                  <input type="password" name="password" class="form-control border-start-0 ps-0"
                         placeholder="Min. 6 characters" required />
                  <button type="button" class="input-group-text bg-transparent border-start-0" onclick="togglePassword(this)">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-medium">Confirm Password</label>
                <div class="input-group">
                  <span class="input-group-text border-end-0 bg-transparent"><i class="bi bi-lock-fill"></i></span>
                  <input type="password" name="confirm_password" class="form-control border-start-0 ps-0"
                         placeholder="Repeat password" required />
                </div>
              </div>
              <button type="submit" class="btn btn-accent w-100 py-2 fw-semibold">
                <i class="bi bi-person-plus me-2"></i>Create Account
              </button>
            </form>
            <p class="text-center text-muted small mt-4 mb-0">
              Already have an account?
              <a href="{{ url_for('login') }}" class="text-accent text-decoration-none fw-medium">Sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function togglePassword(btn) {
  const input = btn.closest(".input-group").querySelector("input");
  const icon  = btn.querySelector("i");
  if (input.type === "password") {
    input.type = "text";
    icon.className = "bi bi-eye-slash";
  } else {
    input.type = "password";
    icon.className = "bi bi-eye";
  }
}
</script>
{% endblock %}
